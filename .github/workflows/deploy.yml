name: Auto Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  backend-verify:
    name: Verify Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "./backend/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Django checks and tests
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run
          flake8 authentication renthing_backend --count --select=E9,F63,F7,F82 --show-source --statistics
          python manage.py test

  frontend-verify:
    name: Verify Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint and build
        run: |
          npm run lint
          npm run build

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [backend-verify, frontend-verify]
    if: ${{ secrets.BACKEND_DEPLOY_HOOK_URL != '' }}

    steps:
      - name: Trigger backend deploy hook
        run: curl -fsSL -X POST "${{ secrets.BACKEND_DEPLOY_HOOK_URL }}"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [backend-verify, frontend-verify]
    if: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL != '' }}

    steps:
      - name: Trigger frontend deploy hook
        run: curl -fsSL -X POST "${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}"
